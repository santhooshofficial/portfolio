<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Santhoosh Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="admin-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="text-center mb-4">
      <div style="font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--text-primary);">
        <span style="color:var(--accent)">&lt;</span>SS<span style="color:var(--accent)">/&gt;</span>
      </div>
      <h2 class="mt-2" style="font-family:'Syne',sans-serif;font-size:1.4rem;">Admin Panel</h2>
      <p style="font-size:0.82rem;color:var(--text-muted);">Santhoosh Portfolio Dashboard</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem;">
          <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-field">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus />
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-login mt-2">
        <i class="fas fa-sign-in-alt me-2"></i>Login
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/" style="font-size:0.78rem;color:var(--text-muted);">
        <i class="fas fa-arrow-left me-1"></i>Back to Portfolio
      </a>
    </div>
  </div>
</div>
</body>
</html>
